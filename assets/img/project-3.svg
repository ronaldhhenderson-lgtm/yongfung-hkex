<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" role="img" aria-label="Industrial park C&amp;I storage project">
  <rect width="480" height="240" fill="#F8F7F3"/>
  <!-- factory skyline -->
  <g fill="#0A1F3D" opacity="0.18">
    <rect x="20" y="100" width="80" height="100"/>
    <rect x="100" y="80" width="60" height="120"/>
    <rect x="160" y="110" width="50" height="90"/>
  </g>
  <!-- chimney -->
  <rect x="120" y="40" width="14" height="40" fill="#0A1F3D" opacity="0.18"/>
  <!-- factory roof PV -->
  <g fill="#0A1F3D" stroke="#C9A961" stroke-width="0.6">
    <rect x="22" y="103" width="76" height="12"/>
    <line x1="22" y1="109" x2="98" y2="109" stroke="#C9A961"/>
    <line x1="40" y1="103" x2="40" y2="115" stroke="#C9A961"/>
    <line x1="60" y1="103" x2="60" y2="115" stroke="#C9A961"/>
    <line x1="80" y1="103" x2="80" y2="115" stroke="#C9A961"/>
    <rect x="102" y="83" width="56" height="12"/>
    <line x1="102" y1="89" x2="158" y2="89" stroke="#C9A961"/>
    <line x1="120" y1="83" x2="120" y2="95" stroke="#C9A961"/>
    <line x1="140" y1="83" x2="140" y2="95" stroke="#C9A961"/>
  </g>
  <!-- ground line -->
  <line x1="0" y1="200" x2="480" y2="200" stroke="#0A1F3D" stroke-width="1.5" opacity="0.4"/>
  <!-- ESS row -->
  <g>
    <rect x="240" y="140" width="60" height="60" rx="3" fill="#1A3463" stroke="#0A1F3D" stroke-width="1.5"/>
    <rect x="238" y="138" width="64" height="6" fill="#C9A961"/>
    <rect x="305" y="140" width="60" height="60" rx="3" fill="#1A3463" stroke="#0A1F3D" stroke-width="1.5"/>
    <rect x="303" y="138" width="64" height="6" fill="#C9A961"/>
    <rect x="370" y="140" width="60" height="60" rx="3" fill="#1A3463" stroke="#0A1F3D" stroke-width="1.5"/>
    <rect x="368" y="138" width="64" height="6" fill="#C9A961"/>
  </g>
  <g stroke="#C9A961" stroke-width="0.6" opacity="0.7">
    <line x1="247" y1="155" x2="295" y2="155"/>
    <line x1="312" y1="155" x2="360" y2="155"/>
    <line x1="377" y1="155" x2="425" y2="155"/>
    <line x1="247" y1="160" x2="295" y2="160"/>
    <line x1="312" y1="160" x2="360" y2="160"/>
    <line x1="377" y1="160" x2="425" y2="160"/>
  </g>
  <!-- power figures -->
  <text x="335" y="190" font-family="JetBrains Mono, monospace" font-size="9" fill="#C9A961" text-anchor="middle" font-weight="600">12 MWh / 6 MW</text>
</svg>
