<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="Source-grid-side utility-scale storage">
  <defs>
    <linearGradient id="ug1" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1A3463"/>
      <stop offset="1" stop-color="#0A1F3D"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" fill="#F8F7F3"/>
  <!-- distant skyline -->
  <g fill="#0A1F3D" opacity="0.15">
    <rect x="20" y="180" width="20" height="60"/>
    <rect x="42" y="195" width="14" height="45"/>
    <rect x="60" y="170" width="22" height="70"/>
    <rect x="84" y="190" width="16" height="50"/>
    <rect x="380" y="175" width="18" height="65"/>
    <rect x="400" y="195" width="14" height="45"/>
    <rect x="416" y="185" width="20" height="55"/>
    <rect x="438" y="200" width="14" height="40"/>
  </g>
  <!-- ground line -->
  <line x1="0" y1="240" x2="480" y2="240" stroke="#0A1F3D" stroke-width="1.5" opacity="0.4"/>
  <!-- 3 utility containers in row -->
  <g>
    <!-- container 1 -->
    <rect x="60" y="150" width="110" height="90" rx="3" fill="url(#ug1)" stroke="#0A1F3D" stroke-width="2"/>
    <rect x="58" y="148" width="114" height="6" fill="#C9A961"/>
    <g stroke="#C9A961" stroke-width="0.8" opacity="0.6">
      <line x1="70" y1="165" x2="160" y2="165"/>
      <line x1="70" y1="172" x2="160" y2="172"/>
    </g>
    <rect x="80" y="195" width="20" height="30" rx="1" fill="#0A1F3D" stroke="#C9A961"/>
    <rect x="105" y="195" width="20" height="30" rx="1" fill="#0A1F3D" stroke="#C9A961"/>
    <rect x="130" y="195" width="20" height="30" rx="1" fill="#0A1F3D" stroke="#C9A961"/>
    <!-- container 2 (center, slightly larger) -->
    <rect x="185" y="135" width="110" height="105" rx="3" fill="url(#ug1)" stroke="#0A1F3D" stroke-width="2"/>
    <rect x="183" y="133" width="114" height="7" fill="#C9A961"/>
    <g stroke="#C9A961" stroke-width="0.8" opacity="0.6">
      <line x1="195" y1="152" x2="285" y2="152"/>
      <line x1="195" y1="159" x2="285" y2="159"/>
    </g>
    <rect x="205" y="180" width="20" height="40" rx="1" fill="#0A1F3D" stroke="#C9A961"/>
    <rect x="230" y="180" width="20" height="40" rx="1" fill="#0A1F3D" stroke="#C9A961"/>
    <rect x="255" y="180" width="20" height="40" rx="1" fill="#0A1F3D" stroke="#C9A961"/>
    <!-- power readout -->
    <rect x="200" y="225" width="80" height="10" rx="1" fill="#C9A961" opacity="0.85"/>
    <text x="240" y="232" font-family="JetBrains Mono, monospace" font-size="7" fill="#0A1F3D" text-anchor="middle" font-weight="600">3,450 kW · DC 1500V</text>
    <!-- container 3 -->
    <rect x="310" y="150" width="110" height="90" rx="3" fill="url(#ug1)" stroke="#0A1F3D" stroke-width="2"/>
    <rect x="308" y="148" width="114" height="6" fill="#C9A961"/>
    <g stroke="#C9A961" stroke-width="0.8" opacity="0.6">
      <line x1="320" y1="165" x2="410" y2="165"/>
      <line x1="320" y1="172" x2="410" y2="172"/>
    </g>
    <rect x="330" y="195" width="20" height="30" rx="1" fill="#0A1F3D" stroke="#C9A961"/>
    <rect x="355" y="195" width="20" height="30" rx="1" fill="#0A1F3D" stroke="#C9A961"/>
    <rect x="380" y="195" width="20" height="30" rx="1" fill="#0A1F3D" stroke="#C9A961"/>
  </g>
  <!-- transmission line at top -->
  <g stroke="#C9A961" stroke-width="1.2" fill="none" opacity="0.7">
    <path d="M30 90 Q240 60 450 90"/>
    <path d="M30 96 Q240 66 450 96"/>
  </g>
  <g fill="#0A1F3D">
    <circle cx="30" cy="90" r="3"/>
    <circle cx="240" cy="63" r="3"/>
    <circle cx="450" cy="90" r="3"/>
  </g>
  <!-- label -->
  <text x="240" y="295" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0A1F3D" text-anchor="middle" letter-spacing="2">SOURCE-GRID-SIDE STORAGE</text>
</svg>
